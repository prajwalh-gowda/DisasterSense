<!DOCTYPE html>
<html>
<head>
    <title>FloodSense Dashboard</title>
</head>
<body style="background:black; color:white; font-family:Arial;">

<h1>FloodSense Live Dashboard</h1>

<div id="nodes"></div>

<script>
async function fetchData() {
    try {
        const res = await fetch("http://127.0.0.1:5000/api/nodes/latest");
        const data = await res.json();

        const container = document.getElementById("nodes");
        container.innerHTML = "";

        data.forEach(n => {
            const div = document.createElement("div");

            div.innerHTML = `
                <h3>${n.location} (${n.node_id})</h3>
                <p>Rainfall: ${n.rainfall_mm}</p>
                <p>Water Level: ${n.water_level_cm}</p>
                <p>Probability: ${n.flood_probability}</p>
                <p style="color:${getColor(n.risk_level)}">
                    Risk: ${n.risk_level}
                </p>
                <hr/>
            `;

            container.appendChild(div);
        });

    } catch (e) {
        console.log("Error:", e);
    }
}

function getColor(risk) {
    if (risk === "CRITICAL") return "red";
    if (risk === "WARNING") return "orange";
    return "green";
}

setInterval(fetchData, 3000);
fetchData();
</script>

</body>
</html>
